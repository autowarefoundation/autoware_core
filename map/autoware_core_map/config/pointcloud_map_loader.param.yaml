/**:
  ros__parameters:
    enable_whole_load: true
    enable_downsampled_whole_load: false
    enable_partial_load: true
    enable_selected_load: false
    enable_internal_differential_visualization: false
    internal_visualization_use_pose: false
    internal_visualization_update_interval_sec: 1.0
    internal_visualization_center_x: 0.0
    internal_visualization_center_y: 0.0
    internal_visualization_radius: 150.0

    # only used when downsample_whole_load enabled
    leaf_size: 3.0 # downsample leaf size [m]
    pcd_paths_or_directory: [$(var pointcloud_map_path)] # Path to the pointcloud map file or directory
    pcd_metadata_path: $(var pointcloud_map_metadata_path) # Path to pointcloud metadata file
