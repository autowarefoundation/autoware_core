name: build-and-test

on:
  push:
    branches:
      - main

jobs:
  bnt:
    strategy:
      fail-fast: false
      matrix:
        rosdistro: [humble, jazzy]
        above: ["", repos-above]
        use-agnocast: ["", use-agnocast]
        include:
          - rosdistro: humble
            container: ghcr.io/autowarefoundation/autoware:core-common-devel

          - rosdistro: jazzy
            container: ghcr.io/autowarefoundation/autoware:core-common-devel-jazzy

    uses: ./.github/workflows/build-and-test-reusable.yaml

    with:
      rosdistro: ${{ matrix.rosdistro }}
      container: ${{ matrix.container }}
      pull-ccache: false
      push-ccache: true
      cache-key-element: build
      above: ${{ matrix.above == 'repos-above' }}
      use-agnocast: ${{ matrix.use-agnocast == 'use-agnocast' }}
      codecov-flag: total-${{ matrix.rosdistro }}${{ matrix.use-agnocast == 'use-agnocast' && '-agnocast' || '' }}
      concurrency-group: build-and-test-${{ matrix.rosdistro }}${{ matrix.above == 'repos-above' && '-above' || '' }}-${{ github.ref }}-${{ github.run_id }}
      runner: ${{ matrix.above == 'repos-above' && '["self-hosted","Linux","X64"]' || '["ubuntu-latest"]' }}

    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
