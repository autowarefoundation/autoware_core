name: build-test-tidy-pr

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check_if_relevant_files_changed:
    runs-on: ubuntu-latest
    outputs:
      run_required: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@v46
        with:
          since_last_remote_commit: true
          files_ignore: |
            **.md
            **/CODEOWNERS
            **/CODEOWNERS-manual

      - name: Log decision
        run: |
          if [[ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]]; then
            echo "🚀 Run is required! Relevant changes detected."
            echo "📂 List of modified files:"
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              echo "  📝 $file"
            done
          else
            echo "⏭️ No relevant changes detected."
            echo "💤 This run will be skipped to save resources."
          fi
        shell: bash

  require-label:
    needs:
      - check_if_relevant_files_changed
    if: ${{ always() }}
    uses: autowarefoundation/autoware-github-actions/.github/workflows/require-label.yaml@v1
    with:
      label: run:build-and-test-differential
      run-condition: ${{ needs.check_if_relevant_files_changed.outputs.run_required == 'true' }}

  build-and-test-diff:
    needs:
      - require-label
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        rosdistro: [humble, jazzy]
        above: ['', repos-above]
        use-agnocast: ['', use-agnocast]
        include:
          - rosdistro: humble
            container: ghcr.io/autowarefoundation/autoware:core-common-devel
          - rosdistro: jazzy
            container: ghcr.io/autowarefoundation/autoware:core-common-devel-jazzy

    uses: ./.github/workflows/build-and-test-diff-reusable.yaml
    with:
      rosdistro: ${{ matrix.rosdistro }}
      container: ${{ matrix.container }}
      above: ${{ matrix.above == 'repos-above' }}
      use-agnocast: ${{ matrix.use-agnocast == 'use-agnocast' }}
      run-condition: ${{ needs.require-label.outputs.result == 'true' }}
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
